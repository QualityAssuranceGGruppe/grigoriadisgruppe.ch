```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRIGORIADIS GRUPPE – Private Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#f5f5f5;
    --text:#222;
    --card:rgba(255,255,255,0.7);
    --primary:#8B6F47;
    --primary-hover:#A08353;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Playfair Display', serif;background:var(--bg);}

/* LOGIN */
#loginScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:url("GGruppe Portal background.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.login-box{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:320px;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.login-box button{
  width:100%;
  padding:12px;
  background:#8B6F47;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.login-box button:hover{background:#A08353;}

#errorMsg{color:#ff6b6b;font-size:14px;margin-top:10px;}

/* MAIN */
#mainContent{display:none;}

.tabs{
  display:flex;
  justify-content:center;
  background:var(--card);
  margin:20px auto;
  border-radius:12px;
  max-width:900px;
}

.tab{
  flex:1;
  padding:15px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  background:var(--primary);
  color:white;
}

.title{text-align:center;margin-top:20px;}
.title h1{font-size:40px;color:var(--primary);}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:40px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
}

/* BUTTONS */
.logout-button, .contact-button{
  position:fixed;
  bottom:20px;
  padding:12px 25px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.logout-button{
  left:20px;
  background:#444;
}
.logout-button:hover{background:#666;}

.contact-button{
  right:20px;
  background:var(--primary);
}
.contact-button:hover{background:var(--primary-hover);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>GGruppe Portal</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Log In</button>
    <p id="errorMsg"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>
  <div class="tab" data-tab="reports">Reports</div>
</div>

<div class="title"><h1>Managing Assets</h1></div>
<div class="dashboard" id="dashboardContainer"></div>

<div class="logout-button" onclick="logout()">Logout</div>
<a href="mailto:quality@grigoriadisgruppe.ch" class="contact-button">Contact</a>

</div>

<script>
// ELEMENTS
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const errorMsg = document.getElementById("errorMsg");

// LOGIN
function login(){
  const user = usernameInput.value.trim();
  const pass = passwordInput.value.trim();

  if(!user || !pass){
    errorMsg.innerText = "Please enter username and password";
    return;
  }

  if(
    user === "dionysios.g@grigoriadisgruppe.ch" &&
    pass === "Catshatedogs-4444"
  ){
    localStorage.setItem("loggedIn", "true");
    showMain();
  } else {
    errorMsg.innerText = "Invalid login credentials";
  }
}

// ENTER KEY LOGIN
[usernameInput, passwordInput].forEach(input=>{
  input.addEventListener("keypress", e=>{
    if(e.key === "Enter") login();
  });

  input.addEventListener("input", ()=>{
    errorMsg.innerText = "";
  });
});

// LOGOUT
function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

// SHOW MAIN
function showMain(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  loadDashboard();
}

// SESSION CHECK
window.onload = () => {
  if(localStorage.getItem("loggedIn") === "true"){
    showMain();
  }
};

// DASHBOARD
function loadDashboard(){
  document.getElementById("dashboardContainer").innerHTML = `
    <div class="card">
      <h3>Welcome</h3>
      <p>Private dashboard active.</p>
    </div>
  `;
}

// TABS
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    if(tab.dataset.tab === "dashboard"){
      loadDashboard();
    } else {
      document.getElementById("dashboardContainer").innerHTML =
        "<div class='card'><h3>Reports Section</h3></div>";
    }
  });
});
</script>

</body>
</html>
```
