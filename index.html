<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Design</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .logo { position: absolute; top: 10px; left: 10px; }
        .button-container { margin-top: 100px; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <img src="path/to/logo.png" alt="Logo" class="logo">
    <div class="button-container">
        <button id="ToInterlanLinks">ToInterlanLinks</button>
        <button id="Mail" style="display:none;">Mail</button>
        <button id="GGdMS" style="display:none;">GGdMS</button>
    </div>
    <script>
        document.getElementById('ToInterlanLinks').onclick = function() {
            var mailButton = document.getElementById('Mail');
            var ggButton = document.getElementById('GGdMS');
            if (mailButton.style.display === 'none') {
                mailButton.style.display = 'block';
                ggButton.style.display = 'none';
            } else {
                mailButton.style.display = 'none';
                ggButton.style.display = 'block';
            }
        };
    </script>
</body>
</html>
