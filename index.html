.login-box input{

</div>

<!-- MAIN -->
<div id="mainContent">

  <div class="tabs">
    <div class="tab active" data-tab="dashboard">Dashboard</div>
    <div class="tab" data-tab="reports">Reports</div>
    <div class="tab" data-tab="scope">Scope</div>
    <div class="tab" data-tab="tools">Tools</div>
  </div>

  <div class="title"><h1>Managing Assets</h1></div>

  <div class="dashboard" id="dashboardContainer"></div>

  <div class="footer">
    <div class="logo-card">
      <img src="NewBulletinLogo-removebg-preview.png" class="logo">
      <div>Investing in Talent.</div>
    </div>
  </div>

  <div class="logout-button" onclick="logout()">Logout</div>

</div>

<script>

/* LOGIN */
function login(){
  const u = username.value.trim();
  const p = password.value.trim();

  if(
    u === "dionysios.g@grigoriadisgruppe.ch" &&
    p === "Catshatedogs-4444"
  ){
    localStorage.setItem("loggedIn","1");
    showApp();
  } else {
    errorMsg.innerText="Invalid credentials";
  }
}

/* ENTER KEY */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") login();
});

/* LOGOUT */
function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

/* SHOW APP */
function showApp(){
  loginScreen.style.display="none";
  mainContent.style.display="block";
  loadDashboard();
}

/* SESSION */
window.onload=()=>{
  if(localStorage.getItem("loggedIn")==="1"){
    showApp();
  }
};

/* DASHBOARD */
function loadDashboard(){
  dashboardContainer.innerHTML=`
    <div class="card">
      <h3>Welcome</h3>
      <p>Dashboard loaded successfully.</p>
    </div>
  `;
}

/* TABS */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");

    if(t.dataset.tab==="dashboard") loadDashboard();
    else dashboardContainer.innerHTML="<div class='card'>Loading section...</div>";
  };
});

</script>

</body>
</html>
