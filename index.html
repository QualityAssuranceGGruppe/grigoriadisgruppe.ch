html,body{

<div id="tools-template" style="display:none;">

<!-- ================= SCRIPT ================= -->
<script>

// LOGIN
function login(){
  const u=username.value.trim();
  const p=password.value.trim();

  if(
    u==="dionysios.g@grigoriadisgruppe.ch" &&
    p==="Catshatedogs-4444"
  ){
    localStorage.setItem("loggedIn","1");
    showApp();
  } else {
    errorMsg.innerText="Wrong credentials";
  }
}

// SESSION
window.onload=()=>{
  if(localStorage.getItem("loggedIn")==="1"){
    showApp();
  }
};

// SHOW APP
function showApp(){
  loginScreen.style.display="none";
  mainContent.style.display="block";
  loadDashboard();
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

// DASHBOARD
function loadDashboard(){
  dashboardContainer.innerHTML=`
    <div class="card">
      <h3>Dashboard</h3>
      <p>System active</p>
    </div>
  `;
}

// REPORTS FIX (REAL CHART RESTORED)
function loadReports(){
  dashboardContainer.innerHTML=`
    <div class="card">
      <h3>Reports</h3>
      <canvas id="chart"></canvas>
    </div>
  `;

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["A","B","C"],
      datasets:[{data:[10,20,30], backgroundColor:"#8B6F47"}]
    }
  });
}

// SCOPES
function loadScope(){
  dashboardContainer.innerHTML=document.getElementById("scope-template").innerHTML;
}

// TOOLS
function loadTools(){
  dashboardContainer.innerHTML=document.getElementById("tools-template").innerHTML;
}

// TABS
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");

    if(t.dataset.tab==="dashboard") loadDashboard();
    if(t.dataset.tab==="reports") loadReports();
    if(t.dataset.tab==="scope") loadScope();
    if(t.dataset.tab==="tools") loadTools();
  };
});

</script>

</body>
</html>
