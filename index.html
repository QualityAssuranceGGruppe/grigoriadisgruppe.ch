<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRIGORIADIS GRUPPE – Online Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#f5f5f5;
    --text:#222;
    --card:rgba(255,255,255,0.7);
    --primary:#8B6F47;
}

body{
    margin:0;
    font-family:'Playfair Display', serif;
    background:var(--bg);
    color:var(--text);
}

/* LOGIN */
#loginOverlay{
    position:fixed;
    inset:0;
    background:url("GGruppe Portal background.jpg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999999;
}

.loginBox{
    width:340px;
    padding:40px;
    border-radius:20px;
    background:rgba(0,0,0,0.65);
    color:white;
    text-align:center;
}

.loginBox input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

.loginBox button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
}

#errorMsg{color:#ff6b6b;}

/* TABS */
.tabs{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    background:var(--card);
    margin:20px auto;
    max-width:1000px;
    border-radius:12px;
    overflow:hidden;
}

.tab{
    flex:1;
    text-align:center;
    padding:15px;
    cursor:pointer;
    font-weight:600;
}

.tab.active{
    background:var(--primary);
    color:white;
}

.link-label{
    font-size:12px;
    color:#A08353;
    margin-left:4px;
}

/* DASHBOARD */
.dashboard{
    padding:40px;
}

/* NEWS FEED */
.news-container{
    height:70vh;
    overflow-y:auto;
    padding:20px;
    background:var(--card);
    border-radius:20px;
}

.news-item{
    padding:15px 0;
    border-bottom:1px solid rgba(0,0,0,0.1);
}

.news-item a{
    text-decoration:none;
    color:var(--primary);
}

.news-source{
    font-size:12px;
    opacity:0.6;
}

/* FOOTER */
.contact-button{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:15px 30px;
    background:var(--primary);
    color:white;
    text-decoration:none;
    border-radius:12px;
}

.logout-button{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:12px 20px;
    background:#444;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="loginBox">
        <h2>Online Portal Log in</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Log In</button>
        <p id="errorMsg"></p>
    </div>
</div>

<!-- MAIN -->
<div id="siteWrapper">

<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>

  <div class="tab" data-tab="mail">
    Mail <span class="link-label">(link)</span>
  </div>

  <div class="tab external" data-url="https://grigoriadisdionysios.de6.quickconnect.to/#/signin">
    Server <span class="link-label">(link)</span>
  </div>

  <div class="tab external" data-url="https://www.etoro.com">
    Portfolio <span class="link-label">(link)</span>
  </div>

  <div class="tab" data-tab="scope">Scope</div>
  <div class="tab" data-tab="tools">Tools</div>
</div>

<!-- DASHBOARD (NEWS ONLY) -->
<div class="dashboard" id="dashboardContainer"></div>

</div>

<a class="contact-button" href="mailto:quality@grigoriadisgruppe.ch">Contact</a>
<div class="logout-button" onclick="logout()">Logout</div>

<script>

/* LOGIN */
function login(){
    const u=document.getElementById("user").value;
    const p=document.getElementById("pass").value;

    if(u==="dionysios.g@grigoriadisgruppe.ch" && p==="Catshatedogs-4444"){
        localStorage.setItem("auth","1");
        document.getElementById("loginOverlay").style.display="none";
    } else {
        document.getElementById("errorMsg").innerText="Invalid login";
    }
}

window.onload=()=>{
    if(localStorage.getItem("auth")==="1"){
        document.getElementById("loginOverlay").style.display="none";
    }
};

function logout(){
    localStorage.removeItem("auth");
    location.reload();
}

/* DASHBOARD NEWS */
async function loadDashboard(){
    const c=document.getElementById("dashboardContainer");

    c.innerHTML=`
    <div class="news-container">
        <h2>Live Financial News</h2>
        <div id="news">Loading news...</div>
    </div>`;

    const feeds=[
        "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml",
        "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
    ];

    let html="";

    for(const url of feeds){
        try{
            const res=await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
            const data=await res.json();

            data.items.slice(0,8).forEach(item=>{
                html+=`
                <div class="news-item">
                    <a href="${item.link}" target="_blank">${item.title}</a>
                    <div class="news-source">${data.feed.title}</div>
                </div>`;
            });

        } catch(e){
            html+=`<div class="news-item">News temporarily unavailable</div>`;
        }
    }

    document.getElementById("news").innerHTML=html;
}

/* TABS */
document.querySelectorAll(".tab").forEach(t=>{
 t.onclick=()=>{

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");

  const tab=t.dataset.tab;

  if(tab==="dashboard") loadDashboard();

  else if(tab==="mail")
    window.open("https://admin.hostpoint.ch/public/en/auth/cloud-office?redirect=1");

  else if(tab==="scope")
    alert("Scope not included in this version");

  else if(tab==="tools")
    alert("Tools not included in this version");

  else if(t.classList.contains("external"))
    window.open(t.dataset.url);
 };
});

loadDashboard();

</script>
</body>
</html>
