<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIGORIADIS GRUPPE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f5f5f5;
    --text: #222;
    --card: rgba(255,255,255,0.7);
}

body.dark {
    --bg: #0f1115;
    --text: #eaeaea;
    --card: rgba(255,255,255,0.05);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 40px;
}

.buttons-container {
    display:flex;
    gap:15px;
}

.text-button {
    padding: 15px 25px;
    border-radius: 12px;
    background: var(--card);
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
    border: 2px solid transparent;
    cursor: pointer;
}

.text-button:hover, .text-button.active {
    background: #8B6F47;
    color: white;
    border-color: #ffffff50;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.toggle {
    cursor:pointer;
    padding:10px 15px;
    border-radius:10px;
    background:#8B6F47;
    color:white;
}

/* TITLE */
.title {
    text-align:center;
}

.title h1 {
    font-family:'Playfair Display', serif;
    font-size:42px;
    color:#8B6F47;
}

/* DASHBOARD */
.dashboard {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

.card {
    padding:20px;
    border-radius:20px;
    background:var(--card);
    backdrop-filter: blur(12px);
    transition:0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

iframe, canvas {
    width:100%;
    height:200px;
    border:none;
}

/* LOGO AREA */
.footer {
    display:flex;
    justify-content:center;
    padding:80px 20px;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.logo-wrapper {
    position: relative;
    perspective: 1000px;
}

#particles {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.logo-card {
    position: relative;
    padding: 30px 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    text-align:center;
}

.logo {
    width:180px;
    opacity:0;
    transform: translateY(20px);
    animation: fadeIn 1.2s ease forwards;
}

.logo-text {
    margin-top:15px;
    letter-spacing:3px;
    font-size:14px;
    color:#8B6F47;
    opacity:0;
    animation: fadeIn 1.5s ease forwards;
}

.ticker {
    margin-top:10px;
    font-size:13px;
    opacity:0;
    animation: fadeIn 2s ease forwards;
}

/* CONTACT BUTTON */
.contact-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 15px 30px;
    background: #8B6F47;
    color: white;
    font-weight: 600;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
    z-index: 999;
}

.contact-button:hover {
    background: #a08353;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

@keyframes fadeIn {
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="buttons-container">
        <a href="#" class="text-button" data-tab="dashboard">Dashboard</a>
        <a href="#" class="text-button" data-tab="reports">Reports</a>
        <a href="https://admin.hostpoint.ch/public/en/auth/cloud-office?redirect=1" class="text-button">Mail</a>
        <a href="https://grigoriadisdionysios.de6.quickconnect.to/#/signin" class="text-button">Server</a>
    </div>

    <div class="toggle" onclick="toggleDark()">Toggle Mode</div>
</div>

<div class="title">
    <h1>Managing Assets</h1>
</div>

<div class="dashboard" id="dashboardContainer">
    <!-- Cards dynamically appear here -->
</div>

<div class="footer">
    <div class="logo-wrapper" id="logoWrapper">
        <canvas id="particles"></canvas>

        <div class="logo-card">
            <img src="NewBulletinLogo-removebg-preview.png" class="logo">
            <div class="logo-text">Investing in Talent.</div>
            <div class="ticker" id="ticker">Loading value...</div>
        </div>
    </div>
</div>

<!-- Contact Us button (sticky) -->
<a href="mailto:quality@grigoriadisgruppe.ch" class="contact-button">Contact Us</a>

<script>
// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 3D TILT
const wrapper = document.getElementById("logoWrapper");
wrapper.addEventListener("mousemove", (e) => {
    const rect = wrapper.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rotateX = (y / rect.height - 0.5) * -10;
    const rotateY = (x / rect.width - 0.5) * 10;
    wrapper.querySelector(".logo-card").style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});
wrapper.addEventListener("mouseleave", () => {
    wrapper.querySelector(".logo-card").style.transform = "rotateX(0) rotateY(0)";
});

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;
let particles = [];
for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedY: Math.random() * 0.5 + 0.2
    });
}
function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(198,169,107,0.6)";
    particles.forEach(p => {
        p.y -= p.speedY;
        if (p.y < 0) p.y = canvas.height;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// TICKER
const ticker = document.getElementById("ticker");
let value = 128.45;
function updateTicker() {
    const change = (Math.random() - 0.5) * 2;
    value += change;
    ticker.innerText =
        "Brand Value Index: " + value.toFixed(2) +
        (change >= 0 ? " ▲" : " ▼");
    ticker.style.color = change >= 0 ? "#4caf50" : "#e53935";
}
setInterval(updateTicker, 2000);
updateTicker();

// TAB FUNCTIONALITY
const stocks = [
    {symbol:"JPM", title:"JP Morgan"},
    {symbol:"MSFT", title:"Microsoft"},
    {symbol:"GS", title:"Goldman Sachs"},
    {symbol:"RHM.DE", title:"Rheinmetall"},
    {symbol:"0857.HK", title:"PetroChina"}
];

const tabs = {
    dashboard: [],
    reports: [
        {
            title: "Revenue Chart",
            content: `<canvas></canvas>`,
            type: "bar",
            chartData: {
                labels: ["JP Morgan","Microsoft","Goldman Sachs","Rheinmetall","PetroChina"],
                datasets: [{ label:"Revenue (B USD)", data:[120,190,55,80,65], backgroundColor:"#8B6F47" }]
            }
        },
        {
            title: "Profit Line",
            content: `<canvas></canvas>`,
            type: "line",
            chartData: {
                labels: ["Q1","Q2","Q3","Q4"],
                datasets: [{ label:"Profit (B USD)", data:[35,40,45,61], borderColor:"#C6A96B", fill:false }]
            }
        },
        {
            title: "Market Share Pie",
            content: `<canvas></canvas>`,
            type: "pie",
            chartData: {
                labels: ["JP Morgan","Microsoft","Goldman Sachs","Rheinmetall","PetroChina"],
                datasets: [{ label:"Market Share %", data:[25,30,15,10,20], backgroundColor:["#8B6F47","#C6A96B","#D4B35B","#E3C88D","#A67C52"]] }
            }
        }
    ]
};

const dashboardContainer = document.getElementById("dashboardContainer");
const tabButtons = document.querySelectorAll(".text-button[data-tab]");

// Initialize dashboard with real-time combined chart
let liveChart;
function loadDashboard() {
    dashboardContainer.innerHTML = "";
    const cardEl = document.createElement("div");
    cardEl.classList.add("card");
    cardEl.innerHTML = `<h3>Live Stock Prices</h3><canvas></canvas>`;
    dashboardContainer.appendChild(cardEl);
    const ctx = cardEl.querySelector("canvas").getContext("2d");

    const labels = stocks.map(s => s.title);
    const data = stocks.map(() => Math.random() * 500);

    liveChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{ label:"Price (USD)", data, borderColor:"#C6A96B", fill:false }]
        },
        options: { responsive:true, plugins:{legend:{display:true}} }
    });

    function updateLiveChart() {
        liveChart.data.datasets[0].data = stocks.map(() => (Math.random() * 500).toFixed(2));
        liveChart.update();
    }
    setInterval(updateLiveChart, 3000);
}

// Load Reports tab
function loadReports() {
    dashboardContainer.innerHTML = "";
    tabs.reports.forEach(card => {
        const cardEl = document.createElement("div");
        cardEl.classList.add("card");
        cardEl.innerHTML = `<h3>${card.title}</h3>${card.content}`;
        dashboardContainer.appendChild(cardEl);

        if(card.type){
            const ctx = cardEl.querySelector("canvas").getContext("2d");
            new Chart(ctx, {
                type: card.type,
                data: card.chartData,
                options: {responsive:true, plugins:{legend:{display:true}}}
            });
        }
    });
}

function loadTab(tabName) {
    if(tabName==="dashboard") loadDashboard();
    else if(tabName==="reports") loadReports();

    tabButtons.forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.text-button[data-tab="${tabName}"]`).classList.add("active");
}

// Initialize default tab
loadTab("dashboard");

// Event listeners
tabButtons.forEach(btn => {
    btn.addEventListener("click", (e) => {
        e.preventDefault();
        loadTab(btn.dataset.tab);
    });
});
</script>

</body>
</html>
