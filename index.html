<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIGORIADIS GRUPPE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f5f5f5;
    --text: #222;
    --card: rgba(255,255,255,0.7);
}

body.dark {
    --bg: #0f1115;
    --text: #eaeaea;
    --card: rgba(255,255,255,0.05);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 40px;
}

.buttons-container {
    display:flex;
    gap:15px;
}

.icon-button {
    width:60px;
    height:60px;
    border-radius:15px;
    background:var(--card);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.icon-button:hover {
    transform:translateY(-5px);
}

.icon-button img {
    width:60%;
}

.toggle {
    cursor:pointer;
    padding:10px 15px;
    border-radius:10px;
    background:#8B6F47;
    color:white;
}

/* TITLE */
.title {
    text-align:center;
}

.title h1 {
    font-family:'Playfair Display', serif;
    font-size:42px;
    color:#8B6F47;
}

/* DASHBOARD */
.dashboard {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

.card {
    padding:20px;
    border-radius:20px;
    background:var(--card);
    backdrop-filter: blur(12px);
    transition:0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

iframe {
    width:100%;
    height:80px;
    border:none;
}

/* LOGO AREA */
.footer {
    display:flex;
    justify-content:center;
    padding:80px 20px;
}

.logo-wrapper {
    position: relative;
    perspective: 1000px;
}

#particles {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.logo-card {
    position: relative;
    padding: 30px 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    text-align:center;
}

.logo {
    width:180px;
    opacity:0;
    transform: translateY(20px);
    animation: fadeIn 1.2s ease forwards;
}

.logo-text {
    margin-top:15px;
    letter-spacing:3px;
    font-size:14px;
    color:#8B6F47;
    opacity:0;
    animation: fadeIn 1.5s ease forwards;
}

.ticker {
    margin-top:10px;
    font-size:13px;
    opacity:0;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="buttons-container">
        <a href="https://admin.hostpoint.ch/public/en/auth/cloud-office?redirect=1" class="icon-button">
            <img src="Mail.png">
        </a>
        <a href="https://grigoriadisdionysios.de6.quickconnect.to/#/signin" class="icon-button">
            <img src="GGdMS.png">
        </a>
    </div>

    <div class="toggle" onclick="toggleDark()">Toggle Mode</div>
</div>

<div class="title">
    <h1>Managing Assets</h1>
</div>

<div class="dashboard">
    <div class="card"><h3>JP Morgan</h3>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=JPM&theme=light"></iframe>
    </div>

    <div class="card"><h3>Rheinmetall</h3>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=RHM.DE&theme=light"></iframe>
    </div>

    <div class="card"><h3>Goldman Sachs</h3>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=GS&theme=light"></iframe>
    </div>

    <div class="card"><h3>Microsoft</h3>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=MSFT&theme=light"></iframe>
    </div>

    <div class="card"><h3>PetroChina</h3>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=0857.HK&theme=light"></iframe>
    </div>
</div>

<div class="footer">
    <div class="logo-wrapper" id="logoWrapper">
        <canvas id="particles"></canvas>

        <div class="logo-card">
            <img src="NewBulletinLogo.png" class="logo">
            <div class="logo-text">NEW BULLETIN</div>
            <div class="ticker" id="ticker">Loading value...</div>
        </div>
    </div>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 3D TILT
const wrapper = document.getElementById("logoWrapper");

wrapper.addEventListener("mousemove", (e) => {
    const rect = wrapper.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = (y / rect.height - 0.5) * -10;
    const rotateY = (x / rect.width - 0.5) * 10;

    wrapper.querySelector(".logo-card").style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

wrapper.addEventListener("mouseleave", () => {
    wrapper.querySelector(".logo-card").style.transform = "rotateX(0) rotateY(0)";
});

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let particles = [];

for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedY: Math.random() * 0.5 + 0.2
    });
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(198,169,107,0.6)";

    particles.forEach(p => {
        p.y -= p.speedY;
        if (p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animateParticles);
}

animateParticles();

// TICKER
const ticker = document.getElementById("ticker");
let value = 128.45;

function updateTicker() {
    const change = (Math.random() - 0.5) * 2;
    value += change;

    ticker.innerText =
        "Brand Value Index: " + value.toFixed(2) +
        (change >= 0 ? " ▲" : " ▼");

    ticker.style.color = change >= 0 ? "#4caf50" : "#e53935";
}

setInterval(updateTicker, 2000);
updateTicker();
</script>

</body>
</html>
