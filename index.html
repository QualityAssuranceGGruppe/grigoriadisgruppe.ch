<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIGORIADIS GRUPPE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f5f5f5;
    --text: #222;
    --card: rgba(255,255,255,0.7);
}

body.dark {
    --bg: #0f1115;
    --text: #eaeaea;
    --card: rgba(255,255,255,0.05);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 40px;
}

/* BUTTONS */
.buttons-container {
    display:flex;
    gap:15px;
}

.icon-button {
    width:60px;
    height:60px;
    border-radius:15px;
    background:var(--card);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.icon-button:hover {
    transform:translateY(-5px);
}

.icon-button img {
    width:60%;
}

/* DARK MODE TOGGLE */
.toggle {
    cursor:pointer;
    padding:10px 15px;
    border-radius:10px;
    background:#8B6F47;
    color:white;
    font-size:14px;
}

/* TITLE */
.title {
    text-align:center;
    margin-top:10px;
}

.title h1 {
    font-family:'Playfair Display', serif;
    font-size:42px;
    color:#8B6F47;
}

/* DASHBOARD GRID */
.dashboard {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

/* CARD */
.card {
    padding:20px;
    border-radius:20px;
    background:var(--card);
    backdrop-filter: blur(12px);
    transition:0.3s;
    cursor:pointer;
}

.card:hover {
    transform: translateY(-8px);
}

/* STOCK NAME */
.card h2 {
    font-size:18px;
    margin-bottom:10px;
}

/* IFRAME */
iframe {
    width:100%;
    height:80px;
    border:none;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:30px;
}

.footer img {
    max-width:150px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="header">

    <div class="buttons-container">
        <a href="https://admin.hostpoint.ch/public/en/auth/cloud-office?redirect=1" class="icon-button">
            <img src="Mail.png" alt="Mail">
        </a>

        <a href="https://grigoriadisdionysios.de6.quickconnect.to/#/signin" class="icon-button">
            <img src="GGdMS.png" alt="System">
        </a>
    </div>

    <div class="toggle" onclick="toggleDark()">Toggle Mode</div>

</div>

<div class="title">
    <h1>Managing Assets</h1>
</div>

<div class="dashboard">

    <a href="https://www.etoro.com/markets/JPM" class="card">
        <h2>JP Morgan</h2>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=JPM&theme=light"></iframe>
    </a>

    <a href="https://www.etoro.com/markets/RHM.DE" class="card">
        <h2>Rheinmetall</h2>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=RHM.DE&theme=light"></iframe>
    </a>

    <a href="https://www.etoro.com/markets/GS" class="card">
        <h2>Goldman Sachs</h2>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=GS&theme=light"></iframe>
    </a>

    <a href="https://www.etoro.com/markets/MSFT" class="card">
        <h2>Microsoft</h2>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=MSFT&theme=light"></iframe>
    </a>

    <a href="https://www.etoro.com/de/markets/00857.hk" class="card">
        <h2>PetroChina</h2>
        <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=0857.HK&theme=light"></iframe>
    </a>

</div>

<div class="footer">
    <img src="NewBulletinLogo.png" alt="Logo">
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
