<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRIGORIADIS GRUPPE – Live Stocks</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg:#f5f5f5;
    --text:#222;
    --card:rgba(255,255,255,0.7);
    --primary:#8B6F47;
    --primary-hover:#A08353;
    --link-color:#888888;
}
body.dark { --bg:#0f1115; --text:#eaeaea; --card:rgba(255,255,255,0.05); }

*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Playfair Display', serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* TABS */
.tabs {
  display:flex;
  justify-content:center;
  background:var(--card);
  border-radius:12px;
  margin:20px auto;
  overflow:hidden;
  max-width:900px;
  flex-wrap:wrap;
  font-family:'Playfair Display', serif;
}
.tab {
  flex:1;
  text-align:center;
  padding:15px 20px;
  cursor:pointer;
  font-weight:600;
  border-bottom:3px solid transparent;
  transition:0.3s;
  min-width:120px;
  font-family:'Playfair Display', serif;
}
.tab:hover{ background:rgba(0,0,0,0.05); }
.tab.active{
  border-bottom:3px solid var(--primary);
  background:var(--primary);
  color:white;
}
.tab .link-text {
  font-size:0.7em;
  color:var(--link-color);
  margin-left:5px;
  font-family:'Playfair Display', serif;
}

/* TITLE */
.title{text-align:center;margin-top:20px;}
.title h1{font-size:42px; color:var(--primary);}

/* DASHBOARD */
.dashboard{
    display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:25px; padding:40px;
}
.card{ padding:20px; border-radius:20px; background:var(--card); backdrop-filter: blur(12px); transition:0.3s; font-family:'Playfair Display', serif; }
.card:hover{ transform: translateY(-8px); }
canvas{ width:100%; height:200px; border:none; font-family:'Playfair Display', serif; }

/* FOOTER */
.footer{display:flex;justify-content:center;padding:60px 20px;flex-direction:column;align-items:center;position:relative;}
.logo-wrapper{position: relative; perspective:1000px;}
.logo-card{position: relative; padding:30px 50px; border-radius:25px; background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); text-align:center;}
.logo{width:180px; opacity:0; transform:translateY(20px); animation:fadeIn 1.2s ease forwards;}
.logo-text{margin-top:15px; letter-spacing:3px; font-size:14px; color:var(--primary); opacity:0; animation:fadeIn 1.5s ease forwards;}

/* CONTACT BUTTON */
.contact-button{
    position:fixed; bottom:20px; right:20px; padding:15px 30px; background:var(--primary); color:white;
    font-weight:600; text-decoration:none; border-radius:12px; transition:0.3s; z-index:999; font-family:'Playfair Display', serif;
}
.contact-button:hover{ background:var(--primary-hover); transform:translateY(-3px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }

/* RESPONSIVE */
@media (max-width: 768px){
  .dashboard{display:flex; flex-direction:column; gap:20px; padding:20px;}
}

@keyframes fadeIn { to { opacity:1; transform:translateY(0); } }
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>
  <div class="tab" data-tab="reports">Reports</div>
  <div class="tab external" data-url="https://admin.hostpoint.ch/public/en/auth/cloud-office?redirect=1">Mail <span class="link-text">(link)</span></div>
  <div class="tab external" data-url="https://grigoriadisdionysios.de6.quickconnect.to/#/signin">Server <span class="link-text">(link)</span></div>
  <div class="tab external" data-url="https://www.etoro.com">Portfolio <span class="link-text">(link)</span></div>
</div>

<div class="title"><h1>Managing Assets</h1></div>
<div class="dashboard" id="dashboardContainer"></div>

<div class="footer">
    <div class="logo-wrapper" id="logoWrapper">
        <div class="logo-card">
            <img src="NewBulletinLogo-removebg-preview.png" class="logo">
            <div class="logo-text">Investing in Talent.</div>
        </div>
    </div>
</div>

<a href="mailto:quality@grigoriadisgruppe.ch" class="contact-button">Contact Us</a>

<script>
// --- 3D LOGO TILT ---
const wrapper=document.getElementById("logoWrapper");
wrapper.addEventListener("mousemove",e=>{
    const rect=wrapper.getBoundingClientRect();
    const rotateX=(e.clientY-rect.top)/rect.height-0.5;
    const rotateY=(e.clientX-rect.left)/rect.width-0.5;
    wrapper.querySelector(".logo-card").style.transform=`rotateX(${-rotateX*10}deg) rotateY(${rotateY*10}deg)`;
});
wrapper.addEventListener("mouseleave",()=>{wrapper.querySelector(".logo-card").style.transform="rotateX(0) rotateY(0)";});

// --- STOCKS ---
const stockList = [
  { symbol:"JPM", title:"JP Morgan" },
  { symbol:"MSFT", title:"Microsoft" },
  { symbol:"GS", title:"Goldman Sachs" },
  { symbol:"RHM.DE", title:"Rheinmetall" },
  { symbol:"0857.HK", title:"PetroChina" }
];
let stockPrices = {};
let liveChart;

// --- TABS DATA ---
const container = document.getElementById("dashboardContainer");
const tabsData = {
  dashboard: [
    { title:"Live Stock Prices", id:"livePrices" },
    { title:"Live Chart", type:"line", chartData:{
      labels: stockList.map(s=>s.title),
      datasets:[{label:"Price USD", data: stockList.map(()=>0), borderColor:"#8B6F47", fill:false, tension:0.4}]
    }}
  ],
  reports: [
    { title:"Revenue Chart", type:"bar", chartData:{
      labels:["JP Morgan","Microsoft","Goldman Sachs","Rheinmetall","PetroChina"],
      datasets:[{label:"Revenue (B USD)",data:[120,190,55,80,65],backgroundColor:"#8B6F47"}]
    }},
    { title:"Profit Line", type:"line", chartData:{
      labels:["Q1","Q2","Q3","Q4"],
      datasets:[{label:"Profit (B USD)",data:[35,40,45,61],borderColor:"#C6A96B",fill:false, tension:0.4}]
    }},
    { title:"Market Share Pie", type:"pie", chartData:{
      labels:["JP Morgan","Microsoft","Goldman Sachs","Rheinmetall","PetroChina"],
      datasets:[{label:"Market Share %", data:[25,30,15,10,20], backgroundColor:["#8B6F47","#C6A96B","#D4B35B","#E3C88D","#A67C52"]}]
    }}
  ]
};

// --- FETCH LIVE STOCK PRICES ---
async function fetchPrice(symbol){
  try{
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`);
    const data = await res.json();
    return data.quoteResponse.result[0]?.regularMarketPrice || 0;
  } catch(e){ return 0; }
}

// --- UPDATE LIVE STOCKS ---
async function updateLivePrices(){
  const liveDiv = document.getElementById("livePrices");
  if(!liveDiv) return;
  liveDiv.innerHTML="";
  for(const s of stockList){
    const price = await fetchPrice(s.symbol);
    stockPrices[s.symbol]=price;
    liveDiv.innerHTML+=`<div>${s.title}: $${price.toFixed(2)}</div>`;
  }
  if(liveChart){
    liveChart.data.datasets[0].data = stockList.map(s=>stockPrices[s.symbol]||0);
    liveChart.update();
  }
}

// --- LOAD TAB ---
async function loadTab(tabName, url){
  container.innerHTML="";
  if(tabName==="dashboard"){
    const liveDiv=document.createElement("div");
    liveDiv.id="livePrices";
    liveDiv.className="card";
    container.appendChild(liveDiv);

    tabsData.dashboard.slice(1).forEach(item=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<h3>${item.title}</h3><canvas></canvas>`;
      container.appendChild(card);
      const ctx = card.querySelector("canvas").getContext("2d");
      liveChart = new Chart(ctx,{
        type:item.type,
        data:item.chartData,
        options:{
          animation:{duration:1000},
          plugins:{legend:{labels:{font:{family:'Playfair Display'}}}},
          scales:{x:{ticks:{font:{family:'Playfair Display'}}}, y:{ticks:{font:{family:'Playfair Display'}}}}
        }
      });
    });

    await updateLivePrices();
    setInterval(updateLivePrices,5000);

  } else if(tabName==="reports"){
    tabsData.reports.forEach(item=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<h3>${item.title}</h3><canvas></canvas>`;
      container.appendChild(card);
      const ctx = card.querySelector("canvas").getContext("2d");
      new Chart(ctx,{
        type:item.type,
        data:item.chartData,
        options:{
          animation:{duration:1000},
          plugins:{legend:{labels:{font:{family:'Playfair Display'}}}},
          scales:{x:{ticks:{font:{family:'Playfair Display'}}}, y:{ticks:{font:{family:'Playfair Display'}}}}
        }
      });
    });
  } else if(tabName==="external"){
    window.open(url,"_blank");
  }
}

// --- TAB EVENTS ---
const tabEls = document.querySelectorAll(".tab");
tabEls.forEach(tab=>{
  tab.addEventListener("click",async ()=>{
    tabEls.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    if(tab.classList.contains("external")){
      await loadTab("external", tab.dataset.url);
    } else {
      await loadTab(tab.dataset.tab);
    }
  });
});

// INIT
loadTab("dashboard");
</script>
</body>
</html>
